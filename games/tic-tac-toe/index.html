<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe — TopSOUL Games</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <link rel="stylesheet" href="../shared/strategy.css">
</head>
<body>
  <main class="shell">
    <div class="topbar"><a class="back" href="../../index.html">← Games</a><span class="pill">You are X · AI is O</span></div>
    <section class="card">
      <div class="layout">
        <div>
          <h1>Tic Tac Toe</h1>
          <p class="subtitle">Tiny grid, surprisingly judgmental opponent.</p>
          <div class="board-wrap"><div id="board" class="board ttt" aria-label="Tic Tac Toe board"></div></div>
        </div>
        <aside class="panel">
          <div class="status" id="status">Choose a move.</div>
          <div class="row">
            <label>AI difficulty <select id="difficulty"><option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option></select></label>
            <button class="primary" id="newGame">New game</button>
          </div>
          <div class="scoreline">
            <div class="scorebox">You<strong id="humanScore">0</strong></div>
            <div class="scorebox">AI<strong id="aiScore">0</strong></div>
          </div>
          <div class="scorebox">Draws<strong id="drawScore">0</strong></div>
          <p class="hint"><b>All-time record</b> is saved on this device. <b>Easy</b> plays randomly. <b>Medium</b> spots wins and blocks. <b>Hard</b> uses minimax, because apparently even a 3×3 grid needed a PhD.</p>
        </aside>
      </div>
    </section>
  </main>
<script>
const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const difficultyEl = document.getElementById('difficulty');
const STORAGE_KEY='topsoul-ttt-record-v1';
function loadScores(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');return {X:Number(saved.X)||0,O:Number(saved.O)||0,D:Number(saved.D)||0};}catch{return {X:0,O:0,D:0};}}
function saveScores(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(scores));}catch{}}
const scores = loadScores();
let board, gameOver, thinking;
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function newGame(){ board = Array(9).fill(''); gameOver = false; thinking = false; render(); setStatus('Your move.'); }
function winner(b=board){
  for(const line of wins){ const [a,c,d]=line; if(b[a] && b[a]===b[c] && b[a]===b[d]) return {mark:b[a], line}; }
  if(b.every(Boolean)) return {mark:'D', line:[]};
  return null;
}
function render(winLine=[]){
  boardEl.innerHTML='';
  board.forEach((v,i)=>{ const cell=document.createElement('button'); cell.className='cell playable'+(winLine.includes(i)?' win':''); cell.textContent=v; cell.setAttribute('aria-label', `Cell ${i+1} ${v||'empty'}`); cell.disabled=!!v||gameOver||thinking; cell.onclick=()=>humanMove(i); boardEl.appendChild(cell); });
  document.getElementById('humanScore').textContent=scores.X; document.getElementById('aiScore').textContent=scores.O; document.getElementById('drawScore').textContent=scores.D;
}
function setStatus(t){ statusEl.textContent=t; }
function humanMove(i){ if(board[i]||gameOver||thinking) return; board[i]='X'; afterMove(); if(!gameOver){ thinking=true; setStatus('AI thinking…'); render(); setTimeout(aiMove, 220); } }
function afterMove(){ const w=winner(); if(!w){ render(); return; } gameOver=true; scores[w.mark]++; saveScores(); render(w.line); setStatus(w.mark==='X'?'You win. Neatly done.':w.mark==='O'?'AI wins. Rude, but legal.':'Draw. Civilised stalemate.'); }
function aiMove(){ const move = chooseMove(); if(move !== undefined) board[move]='O'; thinking=false; afterMove(); if(!gameOver) setStatus('Your move.'); }
function emptyCells(b=board){ return b.map((v,i)=>v?null:i).filter(v=>v!==null); }
function findTactical(mark,b=board){ for(const i of emptyCells(b)){ const copy=b.slice(); copy[i]=mark; const w=winner(copy); if(w && w.mark===mark) return i; } }
function chooseMove(){ const d=difficultyEl.value; const cells=emptyCells(); if(d==='easy') return cells[Math.floor(Math.random()*cells.length)]; const win=findTactical('O'); if(win!==undefined) return win; const block=findTactical('X'); if(block!==undefined) return block; if(d==='medium'){ if(!board[4]) return 4; const corners=[0,2,6,8].filter(i=>!board[i]); return (corners[0] ?? cells[Math.floor(Math.random()*cells.length)]); } return bestMove(); }
function bestMove(){ let best=-Infinity, move; for(const i of emptyCells()){ const b=board.slice(); b[i]='O'; const score=minimax(b,false); if(score>best){ best=score; move=i; } } return move; }
function minimax(b, isMax){ const w=winner(b); if(w) return w.mark==='O'?10:w.mark==='X'?-10:0; if(isMax){ let best=-Infinity; for(const i of emptyCells(b)){ const n=b.slice(); n[i]='O'; best=Math.max(best,minimax(n,false)); } return best; } let best=Infinity; for(const i of emptyCells(b)){ const n=b.slice(); n[i]='X'; best=Math.min(best,minimax(n,true)); } return best; }
document.getElementById('newGame').onclick=newGame; difficultyEl.onchange=newGame; newGame();
</script>
</body>
</html>
