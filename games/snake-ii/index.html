<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Snake II | TopSOUL Games</title><link rel="stylesheet" href="../shared/nokia.css"></head><body><main class="phone"><div class="top"><a class="back" href="../../index.html">← Games</a><strong>Nokia 3410 Classics</strong></div><section class="screen"><div class="layout"><div class="lcd"><div id="board" class="grid"></div></div><aside class="panel"><h1>Snake II</h1><div class="row"><span class="stat">Score <b id="score">0</b></span><span class="stat">Best <b id="best">0</b></span></div><p class="message" id="msg">Eat dots. Bonus bugs appear briefly. Avoid your own tail and the edges.</p><button id="start">New game</button><div class="pad"><button data-d="up">▲</button><button data-d="left">◀</button><button data-d="right">▶</button><button data-d="down">▼</button></div><p class="hint">Keys: arrows/WASD. Space pauses. Nokia-ish rather than archaeologically perfect; considerably fewer pocket lint issues.</p></aside></div></section></main><script>
const W=18,H=14,board=document.getElementById('board'),scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),msg=document.getElementById('msg');
board.style.gridTemplateColumns=`repeat(${W},1fr)`; board.style.height='420px'; let cells=[]; for(let i=0;i<W*H;i++){let c=document.createElement('div');c.className='cell';board.appendChild(c);cells.push(c)}
let snake,dir,next,food,bonus,score,timer,paused=false,alive=false,best=+localStorage.nokiaSnakeIIBest||0; bestEl.textContent=best;
function place(){let p; do p={x:Math.floor(Math.random()*W),y:Math.floor(Math.random()*H)};while(snake.some(s=>s.x==p.x&&s.y==p.y)); return p}
function reset(){snake=[{x:8,y:7},{x:7,y:7},{x:6,y:7}];dir={x:1,y:0};next=dir;food=place();bonus=null;score=0;alive=true;paused=false;clearInterval(timer);timer=setInterval(tick,125);msg.textContent='Playing';draw()}
function draw(){cells.forEach(c=>{c.className='cell';c.textContent=''}); snake.forEach((s,i)=>{let c=cells[s.y*W+s.x];c.className=i?'cell filled':'cell player';c.textContent=i?'':'◉'}); cells[food.y*W+food.x].textContent='•'; if(bonus){let c=cells[bonus.y*W+bonus.x];c.textContent='✣';c.className='cell good'} scoreEl.textContent=score;}
function tick(){if(!alive||paused)return;dir=next;let h={x:snake[0].x+dir.x,y:snake[0].y+dir.y}; if(h.x<0||h.y<0||h.x>=W||h.y>=H||snake.some(s=>s.x==h.x&&s.y==h.y)){alive=false;msg.textContent='Game over. The snake has made a strategic lifestyle choice.';clearInterval(timer);return} snake.unshift(h); if(h.x==food.x&&h.y==food.y){score+=10;food=place(); if(score%50==0)bonus=place()} else if(bonus&&h.x==bonus.x&&h.y==bonus.y){score+=30;bonus=null}else snake.pop(); if(score>best){best=score;localStorage.nokiaSnakeIIBest=best;bestEl.textContent=best} draw()}
function turn(x,y){if(dir.x+x||dir.y+y)next={x,y}}; document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'||e.key==='w')turn(0,-1);if(e.key==='ArrowDown'||e.key==='s')turn(0,1);if(e.key==='ArrowLeft'||e.key==='a')turn(-1,0);if(e.key==='ArrowRight'||e.key==='d')turn(1,0);if(e.key===' ')paused=!paused});document.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>({up:()=>turn(0,-1),down:()=>turn(0,1),left:()=>turn(-1,0),right:()=>turn(1,0)}[b.dataset.d]()));document.getElementById('start').onclick=reset;reset();</script></body></html>
