<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Space Impact | TopSOUL Games</title><link rel="stylesheet" href="../shared/nokia.css"></head><body><main class="phone"><div class="top"><a class="back" href="../../index.html">← Games</a><strong>Nokia 3410 Classics</strong></div><section class="screen"><div class="layout"><div class="lcd"><canvas id="game" class="canvas" width="640" height="420"></canvas></div><aside class="panel"><h1>Space Impact</h1><div class="row"><span class="stat">Score <b id="score">0</b></span><span class="stat">Lives <b id="lives">3</b></span></div><p class="message" id="msg">Shoot incoming ships. Survive the scrolling void, which is mostly green and judgemental.</p><button id="start">New sortie</button><div class="pad"><button data-k="up">▲</button><button data-k="fire" class="wide">FIRE</button><button data-k="down">▼</button></div><p class="hint">Keys: ↑/↓ or W/S to move, Space to fire.</p></aside></div></section></main><script>
const cv=document.getElementById('game'),x=cv.getContext('2d'),scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),msg=document.getElementById('msg');let p,shots,enemies,score,lives,keys={},last=0,spawn=0,run=false;
function reset(){p={x:45,y:190};shots=[];enemies=[];score=0;lives=3;run=true;msg.textContent='Sector clear-ish.';last=performance.now();requestAnimationFrame(loop)}
function fire(){if(run&&shots.length<4)shots.push({x:p.x+24,y:p.y+10})}
function loop(t){let dt=(t-last)/16;last=t;if(!run)return; if(keys.up)p.y-=4*dt;if(keys.down)p.y+=4*dt;p.y=Math.max(8,Math.min(388,p.y));spawn-=dt;if(spawn<=0){enemies.push({x:650,y:20+Math.random()*360,v:2+Math.random()*2});spawn=28-Math.min(14,score/80)}shots.forEach(s=>s.x+=7*dt);enemies.forEach(e=>e.x-=e.v*dt);shots=shots.filter(s=>s.x<650);for(const e of enemies){for(const s of shots){if(Math.abs(s.x-e.x)<18&&Math.abs(s.y-e.y)<18){e.dead=s.dead=true;score+=10}} if(Math.abs(e.x-p.x)<25&&Math.abs(e.y-p.y)<25){e.dead=true;lives--;msg.textContent='Hull dented.'}}enemies=enemies.filter(e=>!e.dead&&e.x>-30);shots=shots.filter(s=>!s.dead);if(lives<=0){run=false;msg.textContent='Mission ended. Nokia insurance declined the claim.'}draw();scoreEl.textContent=score;livesEl.textContent=lives;if(run)requestAnimationFrame(loop)}
function draw(){x.fillStyle='#9fab69';x.fillRect(0,0,640,420);x.fillStyle='#26301e';for(let i=0;i<18;i++)x.fillRect((i*47+score)%640,40+(i*83)%340,3,3);x.fillRect(p.x,p.y,28,18);x.fillRect(p.x+24,p.y+6,10,6);shots.forEach(s=>x.fillRect(s.x,s.y,12,3));enemies.forEach(e=>{x.strokeStyle='#26301e';x.lineWidth=4;x.strokeRect(e.x,e.y,22,16);x.fillRect(e.x+4,e.y+4,8,8)})}
document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'||e.key==='w')keys.up=true;if(e.key==='ArrowDown'||e.key==='s')keys.down=true;if(e.key===' ')fire()});document.addEventListener('keyup',e=>{if(e.key==='ArrowUp'||e.key==='w')keys.up=false;if(e.key==='ArrowDown'||e.key==='s')keys.down=false});document.querySelector('[data-k=up]').onpointerdown=()=>keys.up=true;document.querySelector('[data-k=up]').onpointerup=()=>keys.up=false;document.querySelector('[data-k=down]').onpointerdown=()=>keys.down=true;document.querySelector('[data-k=down]').onpointerup=()=>keys.down=false;document.querySelector('[data-k=fire]').onclick=fire;document.getElementById('start').onclick=reset;reset();</script></body></html>
