<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bumper | TopSOUL Games</title><link rel="stylesheet" href="../shared/nokia.css"></head><body><main class="phone"><div class="top"><a class="back" href="../../index.html">← Games</a><strong>Nokia 3410 Classics</strong></div><section class="screen"><div class="layout"><div class="lcd"><canvas id="game" class="canvas" width="640" height="420"></canvas></div><aside class="panel"><h1>Bumper</h1><div class="row"><span class="stat">Score <b id="score">0</b></span><span class="stat">Balls <b id="balls">3</b></span></div><p class="message" id="msg">Keep the ball up, hit bumpers, pretend this is a pinball table and not a rectangle with ambition.</p><button id="start">New table</button><div class="pad"><button data-m="left">◀</button><button data-m="right">▶</button></div><p class="hint">Keys: ←/→ or A/D. Bumpers add points and speed.</p></aside></div></section></main><script>
const cv=document.getElementById('game'),g=cv.getContext('2d'),scoreEl=document.getElementById('score'),ballsEl=document.getElementById('balls'),msg=document.getElementById('msg');let ball,pad,score,balls,keys={},run=false,last=0,bumpers=[{x:160,y:120,r:24},{x:320,y:80,r:28},{x:470,y:155,r:24},{x:250,y:235,r:22},{x:410,y:270,r:22}];
function reset(){score=0;balls=3;serve();run=true;last=performance.now();requestAnimationFrame(loop)}function serve(){ball={x:320,y:250,vx:3*(Math.random()>.5?1:-1),vy:-4,r:8};pad={x:280,w:92};msg.textContent='Ball in play.'}
function loop(t){let dt=(t-last)/16;last=t;if(!run)return;if(keys.left)pad.x-=6*dt;if(keys.right)pad.x+=6*dt;pad.x=Math.max(0,Math.min(640-pad.w,pad.x));ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;ball.vy+=.12*dt;if(ball.x<ball.r||ball.x>640-ball.r)ball.vx*=-1;if(ball.y<ball.r)ball.vy=Math.abs(ball.vy);if(ball.y>380&&ball.x>pad.x&&ball.x<pad.x+pad.w&&ball.vy>0){ball.vy=-Math.abs(ball.vy)-.4;ball.vx+=(ball.x-(pad.x+pad.w/2))/18;score+=2}for(const b of bumpers){let dx=ball.x-b.x,dy=ball.y-b.y,d=Math.hypot(dx,dy);if(d<b.r+ball.r){let nX=dx/d,nY=dy/d;ball.vx=nX*5.2;ball.vy=nY*5.2;score+=25;b.flash=8}}if(ball.y>440){balls--; if(balls<=0){run=false;msg.textContent='Game over. Gravity remains undefeated.'}else serve()}draw();scoreEl.textContent=score;ballsEl.textContent=balls;if(run)requestAnimationFrame(loop)}
function draw(){g.fillStyle='#9fab69';g.fillRect(0,0,640,420);g.strokeStyle='#26301e';g.lineWidth=4;g.strokeRect(8,8,624,404);for(const b of bumpers){g.beginPath();g.arc(b.x,b.y,b.r,0,7);g.fillStyle=b.flash?'#26301e':'#b8c489';g.fill();g.stroke();if(b.flash)b.flash--}g.fillStyle='#26301e';g.fillRect(pad.x,392,pad.w,12);g.beginPath();g.arc(ball.x,ball.y,ball.r,0,7);g.fill()}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;if(e.key==='ArrowRight'||e.key==='d')keys.right=true});document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;if(e.key==='ArrowRight'||e.key==='d')keys.right=false});document.querySelector('[data-m=left]').onpointerdown=()=>keys.left=true;document.querySelector('[data-m=left]').onpointerup=()=>keys.left=false;document.querySelector('[data-m=right]').onpointerdown=()=>keys.right=true;document.querySelector('[data-m=right]').onpointerup=()=>keys.right=false;document.getElementById('start').onclick=reset;reset();</script></body></html>
