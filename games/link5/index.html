<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link5 | TopSOUL Games</title>
  <link rel="stylesheet" href="../shared/nokia.css">
</head>
<body>
  <main class="phone">
    <section class="bezel">
      <div class="top"><a class="back" href="../../index.html">Games</a><span>3410</span></div>
      <div class="lcd">
        <div class="statusbar"><span>LINK5</span><span id="status">SELECT</span></div>
        <div class="game">
          <div class="menu-title">LINK FIVE</div>
          <div id="board" class="link-board" aria-label="Link5 grid"></div>
          <p id="msg" class="message">Move cursor, press OK. Make five in a row.</p>
        </div>
      </div>
      <div class="softkeys"><button id="newGame">NEW</button><button id="hint">HINT</button></div>
      <div class="navkey" aria-label="Nokia navigation pad">
        <button class="k-up" data-move="up">▲</button><button class="k-left" data-move="left">◀</button><button class="k-ok" id="ok">OK</button><button class="k-right" data-move="right">▶</button><button class="k-down" data-move="down">▼</button>
      </div>
      <div class="keypad"><button data-jump="0">1</button><button data-jump="1">2</button><button data-jump="2">3</button><button data-jump="3">4</button><button data-jump="4">5</button><button data-jump="5">6</button><button data-jump="6">7</button><button data-jump="7">8</button><button data-jump="8">9</button></div>
    </section>
  </main>
<script>
const N=9,board=document.getElementById('board'),msg=document.getElementById('msg'),statusEl=document.getElementById('status');let grid,cursor,over,winLine=[];
function reset(){grid=Array(N*N).fill(0);cursor=40;over=false;winLine=[];msg.textContent='Move cursor, press OK. Make five in a row.';render()}
function render(){board.innerHTML='';grid.forEach((v,i)=>{const b=document.createElement('button');b.className='link-cell';if(v===1){b.textContent='●';b.classList.add('player')}else if(v===2){b.textContent='○';b.classList.add('ai')}else b.textContent=i===cursor?'▣':'';if(winLine.includes(i))b.classList.add('win');b.onclick=()=>{cursor=i;place()};board.appendChild(b)});statusEl.textContent=over?'DONE':'SELECT'}
function place(){if(over||grid[cursor])return;grid[cursor]=1;let w=check(1);if(w)return end('You linked five.',w);if(full())return end('Draw.',[]);ai();w=check(2);if(w)return end('Phone linked five.',w);render()}
function ai(){const empt=grid.map((v,i)=>v?null:i).filter(v=>v!==null);let pick=findWin(2)||findWin(1)||bestMove(empt);grid[pick]=2;msg.textContent='Phone placed.'}
function findWin(p){for(const i of grid.map((v,i)=>v?null:i).filter(v=>v!==null)){grid[i]=p;let ok=check(p);grid[i]=0;if(ok)return i}return null}
function bestMove(empt){return empt.sort((a,b)=>score(b)-score(a))[0]}
function score(i){let r=Math.floor(i/N),c=i%N,total=18-Math.abs(4-r)-Math.abs(4-c);for(const p of [2,1])for(const[dR,dC]of [[1,0],[0,1],[1,1],[1,-1]]){let run=0;for(const dir of [-1,1]){let rr=r+dR*dir,cc=c+dC*dir;while(rr>=0&&rr<N&&cc>=0&&cc<N&&grid[rr*N+cc]===p){run++;rr+=dR*dir;cc+=dC*dir}}total+=run*run*(p===2?5:4)}return total}
function check(p){for(let r=0;r<N;r++)for(let c=0;c<N;c++)for(const[dR,dC]of [[1,0],[0,1],[1,1],[1,-1]]){let line=[];for(let k=0;k<5;k++){let rr=r+dR*k,cc=c+dC*k;if(rr<0||rr>=N||cc<0||cc>=N||grid[rr*N+cc]!==p){line=[];break}line.push(rr*N+cc)}if(line.length===5)return line}return null}
function full(){return grid.every(Boolean)}function end(t,line){over=true;winLine=line;msg.textContent=t;statusEl.textContent='DONE';render()}
function moveCursor(dir){let r=Math.floor(cursor/N),c=cursor%N;if(dir==='up')r=Math.max(0,r-1);if(dir==='down')r=Math.min(N-1,r+1);if(dir==='left')c=Math.max(0,c-1);if(dir==='right')c=Math.min(N-1,c+1);cursor=r*N+c;render()}
document.getElementById('newGame').onclick=reset;document.getElementById('hint').onclick=()=>msg.textContent='Classic phone style: cursor first, OK to place. Five straight marks wins.';document.getElementById('ok').onclick=place;document.querySelectorAll('[data-move]').forEach(b=>b.onclick=()=>moveCursor(b.dataset.move));document.querySelectorAll('[data-jump]').forEach(b=>b.onclick=()=>{cursor=Number(b.dataset.jump)*9+4;render()});document.addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))moveCursor(e.key.replace('Arrow','').toLowerCase());if(e.key==='Enter'||e.key===' ')place();if(e.key>='1'&&e.key<='9'){cursor=(Number(e.key)-1)*9+4;render()}});reset();
</script>
</body>
</html>
