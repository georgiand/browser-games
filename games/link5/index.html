<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Link5 | TopSOUL Games</title><link rel="stylesheet" href="../shared/nokia.css"></head><body><main class="phone"><div class="top"><a class="back" href="../../index.html">← Games</a><strong>Nokia 3410 Classics</strong></div><section class="screen"><div class="layout"><div class="lcd"><div id="board" class="grid"></div></div><aside class="panel"><h1>Link5</h1><div class="row"><span class="stat">Mode <b>5-in-row</b></span></div><p class="message" id="msg">Place five marks in a row before the phone does. The AI blocks obvious disasters, which is more than can be said for many meetings.</p><button id="start">New game</button><p class="hint">Click any empty square. You are dark squares; the phone replies with light squares.</p></aside></div></section></main><script>
const N=9,board=document.getElementById('board'),msg=document.getElementById('msg');board.style.gridTemplateColumns=`repeat(${N},1fr)`;board.style.height='420px';let grid,over;
function reset(){grid=Array(N*N).fill(0);over=false;render();msg.textContent='Your move.'}
function render(){board.innerHTML='';grid.forEach((v,i)=>{let b=document.createElement('button');b.className='cell';b.textContent=v===1?'■':v===2?'□':'';if(v===1)b.classList.add('player');if(v===2)b.classList.add('enemy');b.disabled=over||v;if(!b.disabled)b.onclick=()=>play(i);board.appendChild(b)})}
function play(i){grid[i]=1;if(check(1))return end('You win. Five linked, smugness permitted.');if(full())return end('Draw. Bureaucratic.');ai();if(check(2))return end('Phone wins. Tiny monochrome menace.');render()}
function ai(){let empt=grid.map((v,i)=>v?null:i).filter(v=>v!==null);let win=find(2)||find(1);let pick=win??empt.sort((a,b)=>score(b)-score(a))[0];grid[pick]=2;msg.textContent='Phone moved.'}
function find(p){for(const i of grid.map((v,i)=>v?null:i).filter(v=>v!==null)){grid[i]=p;let ok=check(p);grid[i]=0;if(ok)return i}return null}
function score(i){let r=Math.floor(i/N),c=i%N;return 20-Math.abs(4-r)-Math.abs(4-c)+adj(i,2)*3+adj(i,1)*2}
function adj(i,p){let r=Math.floor(i/N),c=i%N,n=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;let rr=r+dr,cc=c+dc;if(rr>=0&&cc>=0&&rr<N&&cc<N&&grid[rr*N+cc]===p)n++}return n}
function check(p){const dirs=[[1,0],[0,1],[1,1],[1,-1]];for(let r=0;r<N;r++)for(let c=0;c<N;c++)for(const[dR,dC]of dirs){let k=0;while(k<5&&r+dR*k>=0&&r+dR*k<N&&c+dC*k>=0&&c+dC*k<N&&grid[(r+dR*k)*N+c+dC*k]===p)k++;if(k===5)return true}return false}function full(){return grid.every(Boolean)}function end(t){over=true;msg.textContent=t;render()}document.getElementById('start').onclick=reset;reset();</script></body></html>
