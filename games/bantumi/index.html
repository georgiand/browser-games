<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bantumi | TopSOUL Games</title><link rel="stylesheet" href="../shared/nokia.css"></head><body><main class="phone"><div class="top"><a class="back" href="../../index.html">← Games</a><strong>Nokia 3410 Classics</strong></div><section class="screen"><div class="layout"><div class="lcd"><div id="board" class="grid"></div></div><aside class="panel"><h1>Bantumi</h1><div class="row"><span class="stat">You <b id="you">0</b></span><span class="stat">Phone <b id="ai">0</b></span></div><p class="message" id="msg">Mancala/Kalah-style sowing. Your pits are along the bottom. Feed the store on the right.</p><button id="start">New game</button><p class="hint">Click one of your six lower pits. Last stone in your store earns another turn; empty-pit captures apply.</p></aside></div></section></main><script>
const board=document.getElementById('board'),msg=document.getElementById('msg'),youEl=document.getElementById('you'),aiEl=document.getElementById('ai');board.style.gridTemplateColumns='repeat(8,1fr)';board.style.height='420px';let pits,turn;
function reset(){pits=[4,4,4,4,4,4,0,4,4,4,4,4,4,0];turn='you';render()}
function render(){board.innerHTML='';let map=[13,12,11,10,9,8,7,6,0,1,2,3,4,5];map.forEach((idx,i)=>{let c=document.createElement('button');c.className='cell';c.style.minHeight=(idx==6||idx==13)?'180px':'86px';c.textContent=pits[idx];if(idx<6&&turn==='you'&&pits[idx])c.onclick=()=>move(idx);else c.disabled=true; if(idx==6||idx==13)c.classList.add('filled'); board.appendChild(c)});youEl.textContent=pits[6];aiEl.textContent=pits[13];if(done()){let a=pits.slice(0,6).reduce((x,y)=>x+y,0),b=pits.slice(7,13).reduce((x,y)=>x+y,0);pits[6]+=a;pits[13]+=b;for(let i=0;i<14;i++)if(i!==6&&i!==13)pits[i]=0;msg.textContent=pits[6]>pits[13]?'You win. Ancient beans vindicated.':pits[6]<pits[13]?'Phone wins. Rude, but traditional.':'Draw.'}}
function done(){return pits.slice(0,6).every(x=>!x)||pits.slice(7,13).every(x=>!x)}
function move(i){let stones=pits[i];if(!stones)return;pits[i]=0;let cur=i;while(stones){cur=(cur+1)%14;if(turn==='you'&&cur===13)continue;if(turn==='ai'&&cur===6)continue;pits[cur]++;stones--}if(turn==='you'&&cur<6&&pits[cur]===1&&pits[12-cur]){pits[6]+=pits[12-cur]+1;pits[cur]=pits[12-cur]=0}if(turn==='ai'&&cur>6&&cur<13&&pits[cur]===1&&pits[12-cur]){pits[13]+=pits[12-cur]+1;pits[cur]=pits[12-cur]=0}let again=(turn==='you'&&cur===6)||(turn==='ai'&&cur===13);if(!again)turn=turn==='you'?'ai':'you';render();if(turn==='ai'&&!done())setTimeout(ai,450)}
function ai(){let choices=[7,8,9,10,11,12].filter(i=>pits[i]);let pick=choices.find(i=>{let s=pits[i],cur=i;while(s){cur=(cur+1)%14;if(cur!==6)s--}return cur===13})||choices.sort((a,b)=>pits[b]-pits[a])[0];msg.textContent='Phone sows pit '+(pick-6)+'.';move(pick)}
document.getElementById('start').onclick=reset;reset();</script></body></html>
